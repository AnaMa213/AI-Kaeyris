name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check app tests migrations

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev deps
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -q

  security-sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install bandit
        run: pip install "bandit[toml]>=1.7"

      # `--severity-level medium` blocks the job only on Medium/High findings.
      # Lows are reported in logs but don't fail the build (the few we have
      # are `B404/B603/B607` on legitimate ffmpeg/ffprobe subprocess calls).
      - name: bandit (medium+ blocking)
        run: bandit -c pyproject.toml -r app --severity-level medium
