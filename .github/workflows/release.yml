name: Release

# Build a multi-arch container image and publish it to GHCR. Triggered
# on:
#   - push to `main` → tags `:main-<sha>` and `:latest`
#   - push of a SemVer tag `v*` → tags `:v1.2.3` and `:latest`
#
# Watchtower on the host PC polls `:latest` every 5 minutes and pulls
# the new image automatically — see docker-compose.prod.yml.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never abort a release mid-push

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/<owner>/<repo>

jobs:
  build-and-push:
    name: Build multi-arch + push GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets us cross-compile arm64 from the amd64 runner. Free,
      # adds ~30s to the build. Keeps the option of deploying on a
      # Pi 5 (CLAUDE.md §5 Jalon 8 — optional now).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the image tags / OCI labels from the ref. `:latest` is
      # set both on main pushes and on SemVer tag pushes so Watchtower
      # always converges on the newest stable build.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=main-,suffix=-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=ai-kaeyris
            org.opencontainers.image.description=Personal AI sandbox platform — modular FastAPI services
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
