services:
  redis:
    image: redis:7-alpine
    # No host port mapping: Redis is reachable only from the Compose
    # network (security — see ADR 0004).
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Source code: hot-reload without rebuild.
      - ./app:/app/app
      # Local data dir (SQLite DB, audios during transcription).
      # Shared with the worker and visible on the host for inspection.
      - ./data:/app/data
    env_file:
      - .env
    # Lets containers reach services running on the host (e.g. local Ollama).
    # On Linux this explicit gateway is required; Docker Desktop already
    # provides the name, so this is harmless there.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REDIS_URL: redis://redis:6379/0
      # CORS dev — autorise le front Next.js sur localhost:3000.
      # Override du .env (vide par défaut, prod-safe). Ajouter d'autres
      # origines (LAN, https://kaeyris.lan…) via CORS_ALLOWED_ORIGINS dans
      # le .env quand nécessaire, séparées par des virgules.
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - redis
    # Watch ONLY the source tree. Without --reload-dir, watchfiles walks the
    # whole working tree including the bind-mounted /app/data, which holds
    # pytest tmp dirs and the SQLite DB. A single subdir with restrictive
    # permissions (typical on Docker Desktop Windows bind mounts) makes the
    # underlying Rust watcher crash with EACCES and uvicorn dies. Restricting
    # the watch to /app/app fixes the root cause and is also faster.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    env_file:
      - .env
    # Same host gateway as the API: summary jobs run in the worker process.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: ["rq", "worker", "default", "--url", "redis://redis:6379/0"]

volumes:
  redis-data:
