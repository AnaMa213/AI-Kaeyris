# Auto-provisioned at Grafana startup — no manual UI clicks.
# Reference: https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false  # locked: the source of truth is this file
