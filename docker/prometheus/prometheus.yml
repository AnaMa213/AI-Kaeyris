# Prometheus scrape config — runs inside the Compose `internal` network
# so it reaches the API directly (no need to traverse Caddy's basic auth).
# Bumping scrape_interval is the right knob if cardinality grows.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  external_labels:
    service: ai-kaeyris
    env: prod

scrape_configs:
  # FastAPI /metrics — populated by prometheus-client (Jalon 6).
  - job_name: ai-kaeyris-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Prometheus itself — useful for self-monitoring (scrape lag, TSDB size).
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
